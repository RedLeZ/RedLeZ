<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RedLeZ | Desktop Portfolio OS</title>
  <meta name="description" content="Portfolio of RedLeZ - A desktop OS-inspired portfolio featuring compilers, tooling, and mod systems." />
  <meta property="og:title" content="RedLeZ | Desktop Portfolio OS" />
  <meta property="og:description" content="Interactive desktop OS-inspired portfolio with app windows, taskbar, and start menu." />
  <meta property="og:url" content="https://redlez.github.io/RedLeZ/" />
  <meta property="og:image" content="https://redlez.github.io/RedLeZ/assets/og-image.webp"/>
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="./assets/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <!-- Devicon icon font for skill icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="xp-os booting">
  <div class="boot-screen" id="boot-screen" aria-live="polite">
    <div class="boot-core">
      <p class="boot-label">System Booting...</p>
      <h1 class="boot-title">RedLeZ OS</h1>
      <div class="boot-loader" aria-hidden="true">
        <span class="boot-loader-bar"></span>
      </div>
    </div>
  </div>

  <div class="desktop" id="desktop-shell">
    <div class="desktop-wallpaper" aria-hidden="true"></div>

    <div class="desktop-icons" id="desktop-icons" aria-label="Desktop applications"></div>

    <div class="windows-container" id="windows" aria-live="polite"></div>

    <div class="start-menu" id="start-menu" hidden>
      <div class="start-menu-head">
        <strong>RedLeZ OS</strong>
        <span>Applications</span>
      </div>
      <div class="start-menu-apps" id="start-menu-apps"></div>
    </div>

    <div class="taskbar" role="toolbar" aria-label="Desktop taskbar">
      <button class="start-button" id="start-button" type="button" aria-label="Start menu" aria-haspopup="menu" aria-expanded="false">
        <img src="./assets/gear.png" alt="" class="start-button-icon" loading="lazy" decoding="async" />
      </button>
      <div class="taskbar-windows" id="taskbar-windows" aria-label="Open windows"></div>
      <div class="taskbar-tray">
        <div class="tray-time-display">
          <span id="tray-date"></span>
          <span id="tray-time"></span>
        </div>
        <button class="tray-menu-button" id="tray-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">
          ⋮
        </button>
        <div class="tray-menu" id="tray-menu" hidden>
          <div class="tray-menu-content">
            <h3>Credits & Info</h3>
            <ul>
              <li><a href="https://www.flaticon.com/free-icons/neon" title="neon icons" target="_blank">Neon icons created by Flat Icons - Flaticon</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-os" id="mobile-os" aria-label="Mobile OS launcher">
    <header class="mobile-os-header">
      <h1>RedLeZ OS</h1>
      <p>Simple app launcher</p>
    </header>
    <div class="mobile-launcher" id="mobile-launcher"></div>
    <section class="mobile-panel" id="mobile-panel" hidden>
      <div class="mobile-panel-head">
        <button type="button" id="mobile-panel-back" class="mobile-panel-control" aria-label="Back to launcher">Home</button>
        <h2 id="mobile-panel-title"></h2>
        <button type="button" id="mobile-panel-close" class="mobile-panel-control" aria-label="Close app">Close</button>
      </div>
      <p class="mobile-panel-context" id="mobile-panel-context">Home</p>
      <div class="mobile-panel-body" id="mobile-panel-body"></div>
    </section>
  </div>

  <footer class="site-footer" style="display: none;">
    <div class="container">
      <p>© <span id="year"></span> RedLeZ. All rights reserved.</p>
    </div>
  </footer>

  <template id="desktop-icon-template">
    <button class="desktop-icon" type="button">
      <span class="desktop-icon-glyph" aria-hidden="true"></span>
      <span class="desktop-icon-label"></span>
    </button>
  </template>

  <template id="taskbar-button-template">
    <button class="taskbar-window-button" type="button"></button>
  </template>

  <!-- Core Scripts -->
  <script src="./javascript/data.js" defer></script>
  <script src="./javascript/window-manager.js" defer></script>
  <script src="./javascript/script.js" defer></script>
</body>
</html>
